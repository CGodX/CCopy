name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build
        run: cargo packager --release --formats nsis

      - name: 统一产物名前缀为大写 CCopy
        shell: pwsh
        run: |
          Get-ChildItem -Path "target/release" -Filter "*-setup.exe" | ForEach-Object {
            $newName = "CCopy_" + ($_.Name -split '_', 2)[1]
            Rename-Item -Path $_.FullName -NewName $newName
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCopy-windows-x64
          path: target/release/*-setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build
        run: cargo packager --release --formats dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCopy-macos
          path: target/release/*.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 生成提交明细
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE=$(git rev-list --max-parents=0 HEAD)..HEAD
          fi
          {
            echo "body<<EOF"
            git log --pretty=format:"- %s (%h)" "$RANGE"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/**/*-setup.exe
            artifacts/**/*.dmg
